name: Telegram Digest (4x daily)

on:
  schedule:
    # KST 08:00 / 12:00 / 17:00 / 22:00  →  UTC 23:00(전일) / 03:00 / 08:00 / 13:00
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
    - cron: "0 8 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # 수동 실행 테스트용

permissions:
  contents: write         # state.json 커밋용

concurrency:
  group: telegram-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SOURCE_CHAT_ID: ${{ secrets.SOURCE_CHAT_ID }}
          TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python digest.py

      - name: Commit state checkpoint
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "chore: update offset checkpoint [skip ci]"
          git push || true

      - name: Failure alert to Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TARGET_CHAT_ID}" \
            --data-urlencode text="🔴 텔레방 요약 워크플로 실패: ${{ github.workflow }} / run ${{ github.run_id }}"

